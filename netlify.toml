[build]
  command = "echo 'Building SIKU Static Site'"
  publish = "."

[build.environment]
  # Beritahu Netlify bahwa keys ini aman karena dikelola via Dashboard Environment Variables
  SECRETS_SCAN_OMIT_KEYS = "OPENROUTER_API_KEY,FLOWKIRIM_API_KEY,GEMINI_API_KEY,SITE_URL,NODE_ENV"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[dev]
  functions = "netlify/functions"
  publish = "."
  port = 8888

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"